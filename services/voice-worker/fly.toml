app = "adehq-voice-worker"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
